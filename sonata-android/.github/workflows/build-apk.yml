name: Build Sonata APK

on:
  push:
    branches: [main, "feature/**"]
    paths:
      - "sonata-android/**"
      - ".github/workflows/build-apk.yml"
  pull_request:
    paths: ["sonata-android/**"]
  workflow_dispatch:

jobs:
  build:
    name: Build & Sign Release APK
    runs-on: ubuntu-latest

    steps:
      # ── Source ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Java 17 ─────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      # ── Gradle wrapper ──────────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x sonata-android/gradlew

      # ── Build debug APK (always installable, no signing needed) ─────────
      - name: Build Debug APK
        working-directory: sonata-android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── Build release APK ────────────────────────────────────────────────
      - name: Build Release APK
        working-directory: sonata-android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      # ── Sign release with provided keystore ─────────────────────────────
      - name: Sign Release APK (provided keystore)
        if: ${{ secrets.SIGNING_KEY != '' }}
        uses: r0adkll/sign-android-release@v1
        id: sign
        with:
          releaseDirectory: sonata-android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias:            ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword:      ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      # ── Auto-sign release with generated debug keystore (no secrets) ────
      - name: Sign Release APK (generated debug keystore)
        if: ${{ secrets.SIGNING_KEY == '' }}
        run: |
          keytool -genkeypair -v \
            -keystore sonata-debug.jks \
            -alias sonata \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass sonata123 \
            -keypass sonata123 \
            -dname "CN=Sonata Debug, OU=Arkadia, O=Arkadia Intelligence, L=Earth, ST=Earth, C=US"

          APK=$(find sonata-android/app/build/outputs/apk/release -name "*.apk" | head -1)
          SIGNED="${APK%.apk}-installable.apk"

          BUILD_TOOLS=$ANDROID_HOME/build-tools/34.0.0
          $BUILD_TOOLS/zipalign -v -p 4 "$APK" "${APK%.apk}-aligned.apk"
          $BUILD_TOOLS/apksigner sign \
            --ks sonata-debug.jks \
            --ks-key-alias sonata \
            --ks-pass pass:sonata123 \
            --key-pass pass:sonata123 \
            --out "$SIGNED" \
            "${APK%.apk}-aligned.apk"

          echo "INSTALLABLE_APK=$SIGNED" >> $GITHUB_ENV

      # ── Upload signed release APK (provided keystore path) ──────────────
      - name: Upload Signed Release APK
        if: ${{ secrets.SIGNING_KEY != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: Sonata-release-signed-${{ github.sha }}
          path: ${{ steps.sign.outputs.signedReleaseFile }}
          retention-days: 30

      # ── Upload auto-signed release APK (generated keystore path) ────────
      - name: Upload Auto-Signed Release APK
        if: ${{ secrets.SIGNING_KEY == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: Sonata-release-installable-${{ github.sha }}
          path: ${{ env.INSTALLABLE_APK }}
          retention-days: 30

      # ── Upload debug APK (always — directly installable on any device) ───
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Sonata-debug-${{ github.sha }}
          path: sonata-android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      # ── Build summary ─────────────────────────────────────────────────────
      - name: APK size report
        if: always()
        run: |
          echo "### Build output" >> $GITHUB_STEP_SUMMARY
          find sonata-android/app/build/outputs/apk -name "*.apk" 2>/dev/null | while read f; do
            size=$(du -sh "$f" | cut -f1)
            echo "- \`$(basename $f)\` — $size" >> $GITHUB_STEP_SUMMARY
          done
