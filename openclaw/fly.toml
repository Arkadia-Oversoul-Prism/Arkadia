# Fly.io deployment config for Arkadia OpenClaw Gateway
# Free tier: 3 shared VMs, never sleeps
# Deploy: cd openclaw && fly launch (first time) or fly deploy

app = "arkadia-openclaw"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
