# Render.com deployment for Arkadia Oracle Gateway
# New Web Service → Root Directory: openclaw → Runtime: Docker

services:
  - type: web
    name: arkadia-oracle-gateway
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    port: 3000
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "3000"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
    autoDeploy: true
