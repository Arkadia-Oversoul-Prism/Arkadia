# Render.com deployment config for Arkadia OpenClaw Gateway
# Add as a new Web Service in your existing Render account.
# Root directory: openclaw/

services:
  - type: web
    name: arkadia-openclaw
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    port: 3000
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "3000"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
    autoDeploy: true
