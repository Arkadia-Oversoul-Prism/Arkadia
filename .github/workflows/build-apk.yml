name: Build APKs

on:
  push:
    branches: [main, "feature/**"]
    paths:
      - "sonata-android/**"
      - "arkadia-android/**"
      - ".github/workflows/build-apk.yml"
  pull_request:
    paths:
      - "sonata-android/**"
      - "arkadia-android/**"
  workflow_dispatch:

jobs:
  # ── Arkadia OS APK ────────────────────────────────────────────────────────
  build-arkadia:
    name: Build Arkadia APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      # Arkadia shares the same Gradle 8.4 wrapper as Sonata.
      # We copy it at build time so no binary needs to live in git.
      - name: Bootstrap Gradle wrapper from Sonata
        run: |
          cp sonata-android/gradlew arkadia-android/gradlew
          cp sonata-android/gradle/wrapper/gradle-wrapper.jar \
             arkadia-android/gradle/wrapper/gradle-wrapper.jar
          chmod +x arkadia-android/gradlew

      - name: Build Debug APK
        working-directory: arkadia-android
        run: |
          set -o pipefail
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/arkadia-debug.log

      - name: Report Debug build failure
        if: failure()
        run: |
          echo "## ❌ Arkadia Debug build failed" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -n 150 /tmp/arkadia-debug.log >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Build Release APK
        working-directory: arkadia-android
        run: |
          set -o pipefail
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee /tmp/arkadia-release.log

      - name: Report Release build failure
        if: failure()
        run: |
          echo "## ❌ Arkadia Release build failed" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -n 150 /tmp/arkadia-release.log >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Sign & collect APKs
        run: |
          keytool -genkeypair -v \
            -keystore arkadia.jks -alias arkadia \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass arkadia2026 -keypass arkadia2026 \
            -dname "CN=Arkadia,OU=KnowledgeOS,O=ArkadiaIS,L=Earth,ST=Earth,C=US"

          BT=$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -1)

          RELEASE=$(find arkadia-android/app/build/outputs/apk/release \
                    -name "*unsigned.apk" | head -1)
          DEBUG=$(find arkadia-android/app/build/outputs/apk/debug \
                  -name "*.apk" | head -1)

          echo "Release APK: $RELEASE"
          echo "Debug APK:   $DEBUG"

          $BT/zipalign -v -p 4 "$RELEASE" arkadia-aligned.apk
          $BT/apksigner sign \
            --ks arkadia.jks --ks-key-alias arkadia \
            --ks-pass pass:arkadia2026 --key-pass pass:arkadia2026 \
            --out arkadia-release-signed.apk arkadia-aligned.apk

          echo "ARKADIA_DEBUG=$DEBUG" >> $GITHUB_ENV

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Arkadia-release-${{ github.sha }}
          path: arkadia-release-signed.apk
          retention-days: 30

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Arkadia-debug-${{ github.sha }}
          path: ${{ env.ARKADIA_DEBUG }}
          retention-days: 30

      - name: Build summary
        if: always()
        run: |
          echo "### Arkadia APK" >> $GITHUB_STEP_SUMMARY
          find arkadia-android/app/build/outputs/apk -name "*.apk" 2>/dev/null \
            | while read f; do
                echo "- \`$(basename $f)\` — $(du -sh $f | cut -f1)" >> $GITHUB_STEP_SUMMARY
              done
          [ -f arkadia-release-signed.apk ] && \
            echo "- \`arkadia-release-signed.apk\` — $(du -sh arkadia-release-signed.apk | cut -f1)" \
            >> $GITHUB_STEP_SUMMARY || true

  # ── Sonata APK ────────────────────────────────────────────────────────────
  build-sonata:
    name: Build Sonata APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x sonata-android/gradlew

      - name: Build Debug APK
        working-directory: sonata-android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build Release APK
        working-directory: sonata-android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Sign & collect APKs
        run: |
          keytool -genkeypair -v \
            -keystore sonata.jks -alias sonata \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass sonata123 -keypass sonata123 \
            -dname "CN=Sonata,OU=Arkadia,O=ArkadiaIS,L=Earth,ST=Earth,C=US"

          BT=$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -1)

          RELEASE=$(find sonata-android/app/build/outputs/apk/release \
                    -name "*unsigned.apk" | head -1)
          DEBUG=$(find sonata-android/app/build/outputs/apk/debug \
                  -name "*.apk" | head -1)

          $BT/zipalign -v -p 4 "$RELEASE" sonata-aligned.apk
          $BT/apksigner sign \
            --ks sonata.jks --ks-key-alias sonata \
            --ks-pass pass:sonata123 --key-pass pass:sonata123 \
            --out sonata-release-signed.apk sonata-aligned.apk

          echo "SONATA_DEBUG=$DEBUG" >> $GITHUB_ENV

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Sonata-release-${{ github.sha }}
          path: sonata-release-signed.apk
          retention-days: 30

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Sonata-debug-${{ github.sha }}
          path: ${{ env.SONATA_DEBUG }}
          retention-days: 30

      - name: Build summary
        if: always()
        run: |
          echo "### Sonata APK" >> $GITHUB_STEP_SUMMARY
          find sonata-android/app/build/outputs/apk -name "*.apk" 2>/dev/null \
            | while read f; do
                echo "- \`$(basename $f)\` — $(du -sh $f | cut -f1)" >> $GITHUB_STEP_SUMMARY
              done
          [ -f sonata-release-signed.apk ] && \
            echo "- \`sonata-release-signed.apk\` — $(du -sh sonata-release-signed.apk | cut -f1)" \
            >> $GITHUB_STEP_SUMMARY || true
