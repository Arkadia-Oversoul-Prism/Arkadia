name: Build Sonata APK

on:
  push:
    branches: [main, "feature/**"]
    paths:
      - "sonata-android/**"
      - ".github/workflows/build-apk.yml"
  pull_request:
    paths: ["sonata-android/**"]
  workflow_dispatch:

jobs:
  build:
    name: Build & Sign Release APK
    runs-on: ubuntu-latest

    steps:
      # ── Source ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Java 17 ─────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      # ── Gradle wrapper ──────────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x sonata-android/gradlew

      # ── Build debug APK (always installable, no signing needed) ─────────
      - name: Build Debug APK
        working-directory: sonata-android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── Build release APK ────────────────────────────────────────────────
      - name: Build Release APK
        working-directory: sonata-android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      # ── Auto-sign release with generated keystore (no secrets needed) ───
      - name: Sign APKs
        run: |
          keytool -genkeypair -v \
            -keystore sonata-debug.jks \
            -alias sonata \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass sonata123 \
            -keypass sonata123 \
            -dname "CN=Sonata, OU=Arkadia, O=Arkadia Intelligence Systems, L=Earth, ST=Earth, C=US"

          # Find available build-tools version
          BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -1)
          echo "Using build-tools: $BUILD_TOOLS"
          BT=$ANDROID_HOME/build-tools/$BUILD_TOOLS

          RELEASE_APK=$(find sonata-android/app/build/outputs/apk/release -name "*release-unsigned.apk" | head -1)
          DEBUG_APK=$(find sonata-android/app/build/outputs/apk/debug -name "*.apk" | head -1)

          echo "Release APK: $RELEASE_APK"
          echo "Debug APK: $DEBUG_APK"

          # Sign release APK
          $BT/zipalign -v -p 4 "$RELEASE_APK" sonata-release-aligned.apk
          $BT/apksigner sign \
            --ks sonata-debug.jks \
            --ks-key-alias sonata \
            --ks-pass pass:sonata123 \
            --key-pass pass:sonata123 \
            --out sonata-release-signed.apk \
            sonata-release-aligned.apk

          echo "RELEASE_SIGNED=sonata-release-signed.apk" >> $GITHUB_ENV
          echo "DEBUG_APK=$DEBUG_APK" >> $GITHUB_ENV

      # ── Upload release APK ───────────────────────────────────────────────
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Sonata-release-${{ github.sha }}
          path: sonata-release-signed.apk
          retention-days: 30

      # ── Upload debug APK (also directly installable) ─────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Sonata-debug-${{ github.sha }}
          path: ${{ env.DEBUG_APK }}
          retention-days: 30

      # ── Build summary ─────────────────────────────────────────────────────
      - name: APK size report
        if: always()
        run: |
          echo "### Build output" >> $GITHUB_STEP_SUMMARY
          find sonata-android/app/build/outputs/apk -name "*.apk" 2>/dev/null | while read f; do
            size=$(du -sh "$f" | cut -f1)
            echo "- \`$(basename $f)\` — $size" >> $GITHUB_STEP_SUMMARY
          done
          [ -f sonata-release-signed.apk ] && echo "- \`sonata-release-signed.apk\` — $(du -sh sonata-release-signed.apk | cut -f1)" >> $GITHUB_STEP_SUMMARY || true
