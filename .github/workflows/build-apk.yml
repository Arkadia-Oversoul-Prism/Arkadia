name: Build APKs

on:
  push:
    branches: [main, "feature/**"]
    paths:
      - "sonata-android/**"
      - "arkadia-android/**"
      - ".github/workflows/build-apk.yml"
  pull_request:
    paths:
      - "sonata-android/**"
      - "arkadia-android/**"
  workflow_dispatch:

jobs:
  # ── Arkadia OS APK ────────────────────────────────────────────────────────
  build-arkadia:
    name: Build Arkadia APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x arkadia-android/gradlew

      - name: Build Debug APK
        working-directory: arkadia-android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build Release APK
        working-directory: arkadia-android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Sign APKs
        run: |
          keytool -genkeypair -v \
            -keystore arkadia.jks \
            -alias arkadia \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass arkadia2026 \
            -keypass arkadia2026 \
            -dname "CN=Arkadia, OU=Knowledge OS, O=Arkadia Intelligence Systems, L=Earth, ST=Earth, C=US"

          BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -1)
          BT=$ANDROID_HOME/build-tools/$BUILD_TOOLS

          RELEASE_APK=$(find arkadia-android/app/build/outputs/apk/release -name "*release-unsigned.apk" | head -1)
          DEBUG_APK=$(find arkadia-android/app/build/outputs/apk/debug -name "*.apk" | head -1)

          echo "Release APK: $RELEASE_APK"
          echo "Debug APK:   $DEBUG_APK"

          $BT/zipalign -v -p 4 "$RELEASE_APK" arkadia-release-aligned.apk
          $BT/apksigner sign \
            --ks arkadia.jks \
            --ks-key-alias arkadia \
            --ks-pass pass:arkadia2026 \
            --key-pass pass:arkadia2026 \
            --out arkadia-release-signed.apk \
            arkadia-release-aligned.apk

          echo "ARKADIA_DEBUG=$DEBUG_APK" >> $GITHUB_ENV

      - name: Upload Arkadia Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Arkadia-release-${{ github.sha }}
          path: arkadia-release-signed.apk
          retention-days: 30

      - name: Upload Arkadia Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Arkadia-debug-${{ github.sha }}
          path: ${{ env.ARKADIA_DEBUG }}
          retention-days: 30

      - name: APK size report
        if: always()
        run: |
          echo "### Arkadia build output" >> $GITHUB_STEP_SUMMARY
          find arkadia-android/app/build/outputs/apk -name "*.apk" 2>/dev/null | while read f; do
            echo "- \`$(basename $f)\` — $(du -sh "$f" | cut -f1)" >> $GITHUB_STEP_SUMMARY
          done
          [ -f arkadia-release-signed.apk ] && \
            echo "- \`arkadia-release-signed.apk\` — $(du -sh arkadia-release-signed.apk | cut -f1)" >> $GITHUB_STEP_SUMMARY || true

  # ── Sonata APK ────────────────────────────────────────────────────────────
  build-sonata:
    name: Build Sonata APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x sonata-android/gradlew

      - name: Build Debug APK
        working-directory: sonata-android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build Release APK
        working-directory: sonata-android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Sign APKs
        run: |
          keytool -genkeypair -v \
            -keystore sonata-debug.jks \
            -alias sonata \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass sonata123 \
            -keypass sonata123 \
            -dname "CN=Sonata, OU=Arkadia, O=Arkadia Intelligence Systems, L=Earth, ST=Earth, C=US"

          BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -1)
          BT=$ANDROID_HOME/build-tools/$BUILD_TOOLS

          RELEASE_APK=$(find sonata-android/app/build/outputs/apk/release -name "*release-unsigned.apk" | head -1)
          DEBUG_APK=$(find sonata-android/app/build/outputs/apk/debug -name "*.apk" | head -1)

          $BT/zipalign -v -p 4 "$RELEASE_APK" sonata-release-aligned.apk
          $BT/apksigner sign \
            --ks sonata-debug.jks \
            --ks-key-alias sonata \
            --ks-pass pass:sonata123 \
            --key-pass pass:sonata123 \
            --out sonata-release-signed.apk \
            sonata-release-aligned.apk

          echo "SONATA_DEBUG=$DEBUG_APK" >> $GITHUB_ENV

      - name: Upload Sonata Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Sonata-release-${{ github.sha }}
          path: sonata-release-signed.apk
          retention-days: 30

      - name: Upload Sonata Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Sonata-debug-${{ github.sha }}
          path: ${{ env.SONATA_DEBUG }}
          retention-days: 30

      - name: APK size report
        if: always()
        run: |
          echo "### Sonata build output" >> $GITHUB_STEP_SUMMARY
          find sonata-android/app/build/outputs/apk -name "*.apk" 2>/dev/null | while read f; do
            echo "- \`$(basename $f)\` — $(du -sh "$f" | cut -f1)" >> $GITHUB_STEP_SUMMARY
          done
          [ -f sonata-release-signed.apk ] && \
            echo "- \`sonata-release-signed.apk\` — $(du -sh sonata-release-signed.apk | cut -f1)" >> $GITHUB_STEP_SUMMARY || true
